<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plantilla A4 - VIDAFEM</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #d0d0d0;
      font-family: Arial, sans-serif;
      font-size: 11pt;
      color: #222;
    }

    .page {
      width: 210mm;
      min-height: 297mm;
      background: #fff;
      margin: 20px auto;
      position: relative;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.18);
    }

    /* ===== HEADER ===== */
    .header {
      position: relative;
      width: 100%;
      height: 30mm;
      flex-shrink: 0;
    }

    .header-shape-bg {
      position: absolute;
      top: 0;
      right: 0;
      width: 76mm;
      height: 22mm;
      background: #E9E4F6;
      border-radius: 0 0 0 18mm;
    }

    .header-shape-fg {
      position: absolute;
      top: 0;
      right: 0;
      width: 64mm;
      height: 18mm;
      background: #8E7CC3;
      border-radius: 0 0 0 18mm;
    }

    .header-logo {
      position: absolute;
      top: 5mm;
      left: 5mm;
      height: 20mm;
      width: auto;
      z-index: 10;
    }

    /* ===== CONTENIDO ===== */
    .content {
      flex: 1;
      padding: 8mm 14mm;
    }

    /* ===== FOOTER ===== */
    .footer {
      position: relative;
      width: 100%;
      height: 28mm;
      flex-shrink: 0;
    }

    /* Texto DELANTE, z-index alto, color oscuro para leer sobre fondo blanco */
    .footer-info {
      position: absolute;
      bottom: 4.2mm;
      left: 7mm;
      z-index: 20;
      color: #fff;
      font-size: 7.5pt;
      line-height: 1.65;
      max-width: 108mm;
    }

    .footer-info a {
      color: #fff;
      text-decoration: underline;
    }

    /* Forma lila — pegada al borde izquierdo pero empieza donde termina el texto */
    .footer-shape-bg {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 170mm;
      height: 14.6mm;
      background: #E9E4F6;
      border-radius: 0 14mm 0 0;
      z-index: 5;
    }

    /* Forma morada — encima de la lila */
    .footer-shape-fg {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 162mm;
      height: 13.2mm;
      background: #8E7CC3;
      border-radius: 0 14mm 0 0;
      z-index: 6;
    }

    @media print {
      body { background: none; }
      .page { margin: 0; box-shadow: none; }
      @page { size: A4; margin: 0; }
    }
  </style>
</head>
